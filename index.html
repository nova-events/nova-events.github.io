  <style>
    :root {
      --nova-accent: #0EB0A4;
      --nova-bg-primary: #090E12;
      --nova-bg-secondary: #131C24;
      --nova-text-primary: #F0F2F5;
      --nova-text-secondary: #9BA3AE;
      --nova-border: rgba(255,255,255,0.08);
      --nova-card-bg: #111920;
      --radius: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--nova-bg-primary);
      color: var(--nova-text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(14,176,164,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14,176,164,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-wrap img {
      height: 36px;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--nova-text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--nova-text-secondary);
      width: 18px;
      height: 18px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--nova-bg-secondary);
      border: 1px solid var(--nova-border);
      border-radius: var(--radius);
      color: var(--nova-text-primary);
      font-size: 0.9rem;
      font-family: 'Open Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input::placeholder { color: var(--nova-text-secondary); }
    .search-box input:focus { border-color: var(--nova-accent); }

    .filter-wrap {
      position: relative;
      min-width: 200px;
    }

    .filter-btn {
      width: 100%;
      padding: 12px 16px;
      background: var(--nova-bg-secondary);
      border: 1px solid var(--nova-border);
      border-radius: var(--radius);
      color: var(--nova-text-primary);
      font-size: 0.9rem;
      font-family: 'Open Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: border-color 0.2s;
    }

    .filter-btn:hover, .filter-btn.active { border-color: var(--nova-accent); }

    .filter-btn svg {
      width: 16px;
      height: 16px;
      color: var(--nova-text-secondary);
      transition: transform 0.2s;
    }

    .filter-btn.active svg { transform: rotate(180deg); }

    .filter-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--nova-bg-secondary);
      border: 1px solid var(--nova-border);
      border-radius: var(--radius);
      padding: 8px;
      display: none;
      z-index: 100;
      max-height: 320px;
      overflow-y: auto;
    }

    .filter-dropdown.show { display: block; }

    .filter-dropdown label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--nova-text-secondary);
      transition: background 0.15s, color 0.15s;
    }

    .filter-dropdown label:hover {
      background: rgba(255,255,255,0.04);
      color: var(--nova-text-primary);
    }

    .filter-dropdown input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--nova-border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .filter-dropdown input[type="checkbox"]:checked {
      background: var(--nova-accent);
      border-color: var(--nova-accent);
    }

    .filter-dropdown input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .event-count {
      font-size: 0.85rem;
      color: var(--nova-text-secondary);
      margin-bottom: 16px;
    }

    .event-count span {
      color: var(--nova-accent);
      font-weight: 600;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 960px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    /* Card link */
    a.card-link {
      text-decoration: none;
      color: inherit;
      display: block;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--nova-card-bg);
      border: 1px solid var(--nova-border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    }

    a.card-link:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
      border-color: rgba(14,176,164,0.25);
    }

    .card-img-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
    }

    .card-img-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    a.card-link:hover .card-img-wrap img {
      transform: scale(1.06);
    }

    .card-body {
      padding: 16px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge-type {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--nova-accent);
      background: rgba(14,176,164,0.12);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .badge-top {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #F59E0B;
      background: rgba(245,158,11,0.12);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .badge-few {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #EF4444;
      background: rgba(239,68,68,0.12);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .badge-format {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--nova-text-secondary);
      background: rgba(255,255,255,0.06);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--nova-text-secondary);
    }

    .card-info-row svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      color: var(--nova-accent);
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--nova-text-secondary);
      font-size: 0.95rem;
    }

    /* Scrollbar */
    .filter-dropdown::-webkit-scrollbar { width: 6px; }
    .filter-dropdown::-webkit-scrollbar-track { background: transparent; }
    .filter-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .filter-dropdown::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>

function getEventImage(ev) {
  const titleLower = ev.title.toLowerCase();

  // Check keyword rules in order
  for (const rule of KEYWORD_RULES) {
    for (const kw of rule.keywords) {
      if (titleLower.includes(kw)) {
        const imgs = rule.images;
        const photo = imgs[ev.id % imgs.length];
        return `https://images.unsplash.com/${photo}?w=600&h=340&fit=crop&q=80`;
      }
    }
  }

  // Fallback to event_type
  const typeImgs = TYPE_IMAGES[ev.event_type] || TYPE_IMAGES['Other'];
  const photo = typeImgs[ev.id % typeImgs.length];
  return `https://images.unsplash.com/${photo}?w=600&h=340&fit=crop&q=80`;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }) +
    ' \u00b7 ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function formatLabel(f) {
  if (f === 'ONLINE') return 'Online';
  if (f === 'HYBRID') return 'Hybrid';
  return 'On-site';
}

/* ── Build filter checkboxes ── */
const eventTypes = [...new Set(EVENTS.map(e => e.event_type))].sort();
const dropdown = document.getElementById('filterDropdown');
eventTypes.forEach(t => {
  const lbl = document.createElement('label');
  lbl.innerHTML = `<input type="checkbox" value="${t}" checked> ${t}`;
  dropdown.appendChild(lbl);
});

/* ── Render ── */
const grid = document.getElementById('eventsGrid');
const countEl = document.getElementById('eventCount');
const searchInput = document.getElementById('searchInput');
const filterBtn = document.getElementById('filterBtn');

function getSelectedTypes() {
  return [...dropdown.querySelectorAll('input:checked')].map(c => c.value);
}

function render() {
  const q = searchInput.value.toLowerCase().trim();
  const types = getSelectedTypes();

  const filtered = EVENTS.filter(ev => {
    if (!types.includes(ev.event_type)) return false;
    if (q) {
      const hay = (ev.title + ' ' + ev.location + ' ' + ev.event_type).toLowerCase();
      return hay.includes(q);
    }
    return true;
  });

  countEl.innerHTML = `Showing <span>${filtered.length}</span> of ${EVENTS.length} events`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No events match your search. Try different keywords or filters.</div>';
    return;
  }

  grid.innerHTML = filtered.map(ev => {
    const img = getEventImage(ev);
    const loc = ev.location || 'Online';
    let badges = `<span class="badge-type">${ev.event_type}</span>`;
    if (ev.top_rated) badges += '<span class="badge-top">Top Rated</span>';
    if (ev.few_tickets_left) badges += '<span class="badge-few">Few tickets left</span>';
    if (ev.format !== 'ON_SITE') badges += `<span class="badge-format">${formatLabel(ev.format)}</span>`;

    return `<a class="card-link" href="${ev.public_link}" target="_blank" rel="noopener">
      <div class="card-img-wrap">
        <img src="${img}" alt="${ev.title.replace(/"/g, '&quot;')}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-meta">${badges}</div>
        <div class="card-title">${ev.title}</div>
        <div class="card-info">
          <div class="card-info-row">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
            <span>${formatDate(ev.start_date)}</span>
          </div>
          <div class="card-info-row">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A8.966 8.966 0 013 12c0-1.528.38-2.97 1.048-4.23"/></svg>
            <span>${loc}</span>
          </div>
        </div>
      </div>
    </a>`;
  }).join('');
}

/* ── Events ── */
searchInput.addEventListener('input', render);
dropdown.addEventListener('change', render);

filterBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = dropdown.classList.toggle('show');
  filterBtn.classList.toggle('active', isOpen);
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.filter-wrap')) {
    dropdown.classList.remove('show');
    filterBtn.classList.remove('active');
  }
});

render();
</script>
